<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chess</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: antiquewhite;
        }
       
        .main{
            
            display: grid;
            width: fit-content;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
          
            grid-auto-flow: dense;
             gap: 10px;
             
        }
        .box-1, .box-2, .box-3, .box-4, .box-5, .box-6, .box-7, .box-8, .box-9{
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border-radius: 10px;
        }
    </style>
</head>
<body>
     
     <div class="section" >
         <h1>chess tic tac toe</h1>
          <div class="main">
          <div class="box-1"></div>
          <div class="box-2"></div>
          <div class="box-3"></div>
          <div class="box-4"></div>
          <div class="box-5"></div>
          <div class="box-6"></div>
          <div class="box-7"></div>
          <div class="box-8"></div>
            <div class="box-9"></div>
          </div>
          <h1>player & team</h1>
          <button>submit</button>
     </div>
</body>
</html>
