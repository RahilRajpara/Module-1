<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media query layar</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        
        }
        .main{
            display: inline;
            position: absolute;
                  flex-direction: row;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            background-color: azure;

        }
        .box-1{
            position: absolute;
            top: 2px;
            left: 30px;
            width: 300px;
            height: 300px;
            background-color: lightblue;
            border-radius: 10px;
            display: flex;
            float: left;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .box-2{
            position: relative;
            float:left;
            left: 80%;
            width: 300px;
            height: 300px;
            background-color: lightblue;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .box-3{
            position: relative;
            float: left;
            
            left: 120%;
            width: 300px;
            height: 300px;
            background-color: lightblue;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        @media (max-width:480px) {

            .box-1, .box-2, .box-3{
                position: relative;
                top: 20px;
                left: 20%;
                width: 100%;
                height: auto;
                margin-bottom: 20px;
                background-color: blueviolet;
            }
            
        }
    </style>
</head>
<body>
    
<h1>Media Query Layar</h1>
<div class="main">
 <div class="box-1">
     <h1>hello world</h1>
     <p>this is a simple paragraph</p>
     <p>this is created using floting position</p>
     <button>Click me</button>
 </div>
 <div class="box-2">
     <h1>hello world</h1>
     <p>this is another paragraph</p>   
     <p>this is created using floting position</p>
    <button>Click me</button>
 </div>
 <div class="box-3">
     <h1>hello world</h1>
     <p>this is the third paragraph</p>
     <p>this is created using floting position</p>
     <button>Click me</button>
 </div>

</div>
</body>
</html>
