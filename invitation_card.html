<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="invitation.css" />
  <title>Invitation Card</title>

</head>
<body>
  <article class="card">
    <section class="hero">
      <img />
      <div class="hero-text">
        <h1>Summer Celebration</h1>
        <p>Join us for an evening of music, food, and friends under the open sky.</p>
      </div>
      <map name="hero-map">
        <area shape="rect" coords="30,30,210,120" href="#venue" alt="See venue details" />
        <area shape="circle" coords="710,90,76" href="#rsvp" alt="Jump to RSVP" />
      </map>
    </section>

    <div class="content">
      <div class="tag">Birthday Party · June 22</div>

      <div class="details">
        <div>
          <strong>Host</strong>
          <span>Emma &amp; Friends</span>
        </div>
        <div>
          <strong>Date</strong>
          <span>Saturday, June 22 at 6:00 PM</span>
        </div>
        <div>
          <strong id="venue">Location</strong>
          <span>Sunset Garden Hall, 123 Flower Lane</span>
        </div>
      </div>

      <figure class="map-card">
       <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3670.1854934180988!2d72.53206287516664!3d23.090304579126382!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e833af6f39347%3A0xf1db9065daea7008!2sSilver%20Oak%20University!5e0!3m2!1sen!2sin!4v1778575567139!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" "></iframe>
        <figcaption>
          Click the map area to open directions in Google Maps.
          <span class="hint">The clickable zone in the lower-left opens the venue location.</span>
        </figcaption>
      </figure>

      <div class="button-row">
        <a class="btn-rsvp" id="rsvp" href="mailto:emma@example.com?subject=RSVP%20for%20Summer%20Celebration">RSVP Now</a>
       
      </div>
    </div>
  </article>
</body>
</html>
